apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  template:
    spec:
      containers:
        - name: frontend
          env:
            - name: AD_SERVICE_ADDR
              value: "aws-dev-adservice:9555"
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              value: "aws-dev-productcatalogservice:3550"
            - name: CURRENCY_SERVICE_ADDR
              value: "aws-dev-currencyservice:7000"
            - name: CART_SERVICE_ADDR
              value: "aws-dev-cartservice:7070"
            - name: RECOMMENDATION_SERVICE_ADDR
              value: "aws-dev-recommendationservice:8080"
            - name: CHECKOUT_SERVICE_ADDR
              value: "aws-dev-checkoutservice:5050"
            - name: SHIPPING_SERVICE_ADDR
              value: "aws-dev-shippingservice:50051"
            - name: SHOPPING_ASSISTANT_SERVICE_ADDR
              value: "aws-dev-shoppingassistantservice:80"