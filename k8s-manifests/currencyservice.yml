apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  labels:
    app: productcatalogservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      serviceAccountName: productcatalogservice
      containers:
        - name: productcatalogservice
          image: productcatalogservice:1.0
          ports:
            - containerPort: 7000
          env:
            - name: PORT
              value: "7000"
            - name: ENABLE_TRACING
              value: "1"
            - name: DISABLE_PROFILER
              value: ""
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            rgpc:
              port: 7000
              initialDelaySeconds: 20
              periodSeconds: 15
          livenessProbe:
            rgpc:
              port: 7000
              initialDelaySeconds: 20
              periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  labels:
    app: productcatalogservice
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
  ports:
    - port: 7000
      targetPort: 7000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: productcatalogservice