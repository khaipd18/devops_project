apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  labels:
    app: adservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:             
      labels:
        app: adservice
    spec:
      serviceAccountName: adservice
      securityContext:    
        runAsUser: 3000
        runAsGroup: 3000
        fsGroup: 3000
      containers:
      - name: adservice
        image: adservice:local
        imagePullPolicy: Never 
        securityContext:       
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        ports:
          - containerPort: 9555
        env:
          - name: PORT
            value: "9555"
        resources:
          limits:
            cpu: 300m
            memory: 300Mi
          requests:
            cpu: 200m
            memory: 180Mi
        readinessProbe:
          grpc:
            port: 9555
          initialDelaySeconds: 20
          periodSeconds: 20
        livenessProbe:
          grpc:
            port: 9555
          initialDelaySeconds: 20
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  labels:
    app: adservice
spec:
  selector:
    app: adservice
  type: ClusterIP
  ports:
    - port: 9555
      targetPort: 9555
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adservice
  labels:
    app: adservice