name: CI for .NET Services

on: 
  push:
    branches: [ "main" ]
    paths:
      - 'src/cartservice/**'
  workflow_dispatch: 
    inputs:
      custom_tag:
        description: 'Image tag to use for this build (optional, defaults to git sha)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            cartservice: 'src/cartservice/**'

  build-and-push:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || (needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '') }}
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: write
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON( github.event_name == 'workflow_dispatch' && '["cartservice"]' || needs.detect-changes.outputs.matrix ) }}
    
    defaults:
      run:
        working-directory: ./src/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: 'src/${{ matrix.service }}/**/*.csproj'
          
      - name: Restore dependencies
        run: dotnet restore

      - name: Run Linter (dotnet format)
        run: dotnet format --verify-no-changes || echo "Code formatting issues found, please fix them later!"

      - name: Run Security Scan
        run: dotnet list package --vulnerable

      - name: Build Application
        run: dotnet build --no-restore --configuration Release

      - name: Run Unit Tests
        run: dotnet test --no-build --configuration Release || echo "Unit tests failed or missing, but continuing for now."

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::797226340543:role/github-actions-ecr-oidc-role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }} 
          IMAGE_TAG: ${{ github.event.inputs.custom_tag || github.sha }}
        run: |
          if [ -d "src" ]; then
            cd src
          fi
        
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "NEW_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "FULL_REPO=$ECR_REGISTRY/$ECR_REPOSITORY" >> $GITHUB_ENV

      - name: Update GitOps and Push Back
        working-directory: . 
        run: |
          # Update image configs
          yq -i '.image.repository = "${{ env.FULL_REPO }}"' gitops/dev-eks/values-${{ matrix.service }}.yaml
          yq -i '.image.tag = "${{ env.NEW_TAG }}"' gitops/dev-eks/values-${{ matrix.service }}.yaml

          # Configure git bot
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          # Commit changes
          git add gitops/dev-eks/values-${{ matrix.service }}.yaml
          git commit -m "chore(gitops): update ${{ matrix.service }} to ${{ env.NEW_TAG }} [skip ci]"

          # Retry loop for concurrent pushes
          for i in {1..5}; do
            git pull --rebase origin main
            if git push origin main; then
              echo "Successfully pushed ${{ matrix.service }} updates."
              exit 0
            fi
            echo "Conflict detected (attempt $i/5). Retrying..."
            sleep $((RANDOM % 5 + 1))
          done
          
          echo "Failed to push after 5 attempts."
          exit 1