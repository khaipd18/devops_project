name: CI for Go Services

on: 
  push:
    branches: [ "main" ]
    paths:
      - 'src/frontend/**'
      - 'src/checkoutservice/**'
      - 'src/productcatalogservice/**'
      - 'src/shippingservice/**'
  workflow_dispatch: 
    inputs:
      custom_tag:
        description: 'Image tag to use for this build (optional, defaults to git sha)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend: 'src/frontend/**'
            checkoutservice: 'src/checkoutservice/**'
            productcatalogservice: 'src/productcatalogservice/**'
            shippingservice: 'src/shippingservice/**'

  build-and-push:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || (needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '') }}
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON( github.event_name == 'workflow_dispatch' && '["frontend", "checkoutservice", "productcatalogservice", "shippingservice"]' || needs.detect-changes.outputs.matrix ) }}
    
    defaults:
      run:
        working-directory: ./src/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: src/${{ matrix.service }}/go.sum 

      - name: Run Linter, Security & Test
        run: |
          go mod download
          
          # Lint
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...
          
          # Vulnerability Check
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
          
          # Test
          go test -v ./...

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::797226340543:role/github-actions-oidc-role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }} 
          IMAGE_TAG: ${{ github.event.inputs.custom_tag || github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG