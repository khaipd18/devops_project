name: CI for Frontend Service

on: 
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - 'src/frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true
          cache-dependency-path: src/frontend/go.sum
    
      - name: Download dependencies, Verify and Tidy dependencies
        run:  | 
            go mod download 
            go mod verify 
            go mod tidy
            git diff --exit-code go.mod go.sum

      - name: Run Linter (golangci-lint)
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          golangci-lint run ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Run Unit Tests
        run: go test -v ./...

        