name: CI for Python Services

on: 
  push:
    branches: [ "main" ]
    paths:
      - 'src/emailservice/**'
      - 'src/recommendationservice/**'
  workflow_dispatch: 
    inputs:
      custom_tag:
        description: 'Image tag to use for this build (optional, defaults to git sha)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            emailservice: 'src/emailservice/**'
            recommendationservice: 'src/recommendationservice/**'

  build-and-push:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || (needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '') }}
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON( github.event_name == 'workflow_dispatch' && '["emailservice", "recommendationservice"]' || needs.detect-changes.outputs.matrix ) }}
    
    defaults:
      run:
        working-directory: ./src/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' 
          cache: 'pip' 

      - name: Install dependencies & CI tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8==7.3.0 pytest==9.0.3 bandit==1.9.4

      - name: Run Linter (flake8)
        run: flake8 .

      - name: Run Security Scan (bandit)
        run: bandit -r . -x tests/ -ll

      - name: Run Unit Tests (pytest)
        run: pytest || echo "No tests found or tests failed, but continuing for now."

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::797226340543:role/github-actions-oidc-role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }} 
          IMAGE_TAG: ${{ github.event.inputs.custom_tag || github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG