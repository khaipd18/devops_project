name: CI for Node.js Services

on: 
  push:
    branches: [ "main" ]
    paths:
      - 'src/currencyservice/**'
      - 'src/paymentservice/**'
  workflow_dispatch: 
    inputs:
      custom_tag:
        description: 'Image tag to use for this build (optional, defaults to git sha)'
        required: false
        type: string

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Filter changed paths
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            currencyservice: 'src/currencyservice/**'
            paymentservice: 'src/paymentservice/**'

  build-and-push:
    needs: detect-changes
    if: ${{ github.event_name == 'workflow_dispatch' || (needs.detect-changes.outputs.matrix != '[]' && needs.detect-changes.outputs.matrix != '') }}
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write 
      contents: read
    
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON( github.event_name == 'workflow_dispatch' && '["currencyservice", "paymentservice"]' || needs.detect-changes.outputs.matrix ) }}
    
    defaults:
      run:
        working-directory: ./src/${{ matrix.service }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run Linter (ESLint)
        run: |
          npm run lint --if-present || npx eslint . || echo "Linter failed or not configured, continuing..."

      - name: Run Security Scan (npm audit)
        run: npm audit --audit-level=high || echo "High vulnerabilities found, Devs need to check package.json!"

      - name: Run Unit Tests
        run: npm test --if-present

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::797226340543:role/github-actions-oidc-role
          aws-region: ap-southeast-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ matrix.service }} 
          IMAGE_TAG: ${{ github.event.inputs.custom_tag || github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG