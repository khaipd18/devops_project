deployment:
  enabled: true
replicaCount: 1
serviceAccount:
  create: true
  name: "emailservice"
image:
  repository: 797226340543.dkr.ecr.ap-southeast-1.amazonaws.com/emailservice
  tag: "0377f458dd98b864c93c6fe9594e8814d8ff34b8"
  pullPolicy: Always
service:
  enabled: true
  type: ClusterIP
  port: 8080
  targetPort: 8080
env:
  PORT: "8080"
  ENABLE_TRACING: "1"
  DISABLE_PROFILER: "1"
resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi
probes:
  readiness:
    grpc:
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 20
  liveness:
    grpc:
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 20
