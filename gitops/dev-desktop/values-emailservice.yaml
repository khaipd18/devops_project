deployment: 
  enabled: true

replicaCount: 1

serviceAccount:
  create: true
  name: "emailservice"

image:
  repository: emailservice
  tag: "local"
  pullPolicy: Never

service:
  enabled: true
  type: ClusterIP
  port: 8080
  targetPort: 8080

env:
  PORT: "8080"
  ENABLE_TRACING: "1"
  DISABLE_PROFILER: "1"

resources:
  limits:
    cpu: 200m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

probes:
  readiness:
    grpc:
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 20
  liveness:
    grpc:
      port: 8080
    initialDelaySeconds: 20
    periodSeconds: 20